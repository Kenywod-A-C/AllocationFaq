<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Allocation Hub | Dynamic Sidebar Navigation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f1f5f9;
      color: #0f172a;
      line-height: 1.5;
    }

    /* MAIN LAYOUT */
    .app-container {
      display: flex;
      flex-wrap: wrap;
      min-height: 100vh;
    }

    /* ========= SIDEBAR ========= */
    .sidebar {
      width: 300px;
      background: #030047;   /* requested deep navy background */
      color: #f0f4ff;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.2);
      transition: all 0.2s;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 28px 24px 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .sidebar-header h2 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.3px;
      background: linear-gradient(130deg, #FFFFFF, #b7c9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sidebar-header p {
      font-size: 0.75rem;
      color: #bfd6ff;
      margin-top: 6px;
    }

    /* navigation menu */
    .nav-menu {
      flex: 1;
      padding: 20px 12px 20px 12px;
    }

    /* main category item */
    .nav-category {
      margin-bottom: 12px;
      border-radius: 20px;
      background: rgba(10, 20, 70, 0.5);
      transition: 0.2s;
      overflow: hidden;
    }

    /* highlight category when it contains active submenu */
    .nav-category.has-active {
      background: rgba(50, 90, 180, 0.3);
      box-shadow: 0 0 0 1px rgba(100, 150, 255, 0.3);
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: rgba(10, 45, 100, 0.7);
      border-radius: 20px;
      transition: background 0.2s;
      user-select: none;
    }

    .category-header:hover {
      background: #1f3b7a;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
      font-weight: 400;
    }

    /* submenu list */
    .submenu-list {
      list-style: none;
      background: rgba(2, 20, 60, 0.7);
      display: none;
      padding: 8px 0 12px 0;
    }

    .submenu-list.show {
      display: block;
    }

    .submenu-item {
      padding: 12px 20px 12px 52px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      color: #e2ecff;
      font-weight: 500;
      margin: 2px 8px;
      border-radius: 40px;
    }

    .submenu-item:hover {
      background: #2e4f9e;
      color: white;
      padding-left: 58px;
    }

    .submenu-item.active-sub {
      background: #3a67c2;
      color: white;
      border-left-color: #ffd966;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    /* MAIN CONTENT AREA */
    .main-content {
      flex: 1;
      background: #ffffff;
      padding: 32px 40px;
      min-width: 260px;
    }

    .content-card {
      background: #fefefe;
      border-radius: 32px;
      padding: 28px 34px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
      border: 1px solid #eef2f8;
      animation: fadeSlide 0.25s ease-out;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .content-card h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #030047, #2c5aa6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      border-left: 5px solid #3a67c2;
      padding-left: 20px;
    }

    .badge {
      display: inline-block;
      background: #e9f0fc;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #030047;
      margin-bottom: 18px;
    }

    .info-block {
      background: #f8fafd;
      padding: 20px 24px;
      border-radius: 24px;
      margin: 20px 0;
      border-left: 4px solid #3a67c2;
    }

    .info-block h3 {
      margin-bottom: 12px;
      color: #030047;
    }

    ul {
      margin: 12px 0 12px 20px;
    }

    li {
      margin: 8px 0;
    }

    hr {
      margin: 24px 0;
      border: none;
      height: 1px;
      background: linear-gradient(to right, #dce7f0, transparent);
    }

    /* responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
      }
      .main-content {
        padding: 24px 20px;
      }
      .content-card {
        padding: 20px;
      }
      .category-header {
        padding: 14px 18px;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #e2edf2;
    }
    ::-webkit-scrollbar-thumb {
      background: #2c7c9c;
      border-radius: 8px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <!-- SIDEBAR (dynamically generated) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>⚡ Allocation Hub</h2>
      <p>Cards · Asset · CD · Smart Navigation</p>
    </div>
    <div class="nav-menu" id="sidebarNavMenu"></div>
    <div style="padding: 16px 20px 24px; font-size: 0.65rem; color: #acc9ff; text-align: center; border-top: 1px solid rgba(255,255,255,0.1);">
      ⚡ Click category to expand/collapse submenu
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="dynamicContentArea" class="content-card">
      <div style="text-align: center; padding: 40px 20px;">
        <span style="font-size: 2.5rem;">📌</span>
        <h3 style="margin-top: 20px; color: #1c6a85;">Select a submenu item</h3>
        <p style="margin-top: 12px;">Expand any category and click on submenu to view detailed allocation intelligence.</p>
      </div>
    </div>
  </main>
</div>

<script>
  // ---------- MENU CONFIGURATION (exactly as requirements) ----------
  const categories = [
    {
      id: "cards",
      label: "Cards Allocation",
      icon: "💳",
      submenus: [
        "Reallocation",
        "Daily Allocation Files",
        "Exception",
        "Exception Tagging",
        "Web Collection and Vymo",
        "Vendor Empanel",
        "Rules",
        "Tab 1 Heading 1",
        "Tab 1 Heading 2"
      ]
    },
    {
      id: "assets",
      label: "Asset Allocation",
      icon: "🏢",
      submenus: [
        "Tab 2 Heading 1",
        "Tab 2 Heading 2",
        "Tab 2 Heading 3",
        "Tab 2 Heading 4",
        "Tab 2 Heading 5"
      ]
    },
    {
      id: "cd",
      label: "CD Allocation",
      icon: "📀",
      submenus: [
        "Tab 3 Heading 1",
        "Tab 3 Heading 2",
        "Tab 3 Heading 3",
        "Tab 3 Heading 4",
        "Tab 3 Heading 5"
      ]
    }
  ];

  // ---------- DYNAMIC CONTENT GENERATOR (rich and unique for each submenu) ----------
  function generateContent(categoryId, submenuTitle) {
    const categoryDisplay = categoryId === "cards" ? "CARDS ALLOCATION" : (categoryId === "assets" ? "ASSET ALLOCATION" : "CD ALLOCATION");

    const contentMap = {
      // ----- CARDS submenus (9 items) -----
      "Reallocation": `
        <h2>🔄 Reallocation Framework</h2>
        <div class="badge">${categoryDisplay} • REALLOCATION POLICY</div>
        <div class="info-block"><h3>📌 Eligible accounts</h3><p>Cases moved from Agency to Agency + exception accounts transferred to agency. <strong>Excluded:</strong> NAL (In-house accounts). Reallocation limit: <strong>max 7.50%</strong> of portfolio volume.</p></div>
        <h3>📂 Post‑upload validation files</h3>
        <ul><li>FLOWS → <code>CARDS_REALLOCATION_VALIDATIONBASE_US_FLOWS.xlsx</code></li><li>Recovery Region → <code>..._WOFF_RGN.xlsx</code></li><li>Recovery Central → <code>..._WOFF_CCT.xlsx</code></li><li>Channel change → <code>..._WOFF_CHANNEL.xlsx</code></li></ul>
        <p><strong>⏱️ Cycle:</strong> Every Tuesday. Verify status files 24h after upload.</p>
      `,
      "Daily Allocation Files": `
        <h2>📂 Daily Allocation Files</h2>
        <div class="badge">${categoryDisplay} • DAILY DUMP</div>
        <div class="info-block"><p>Access daily allocation extracts, removal cases, and complaint logs for Cards portfolio.</p></div>
        <ul><li>📌 Updated Dump → <code>/CARDSALLOCATION/DAILY_ALLOCATION_FILES/</code></li><li>🗑️ Removal Cases → <code>/CARDSALLOCATION/EXP/</code></li><li>⚠️ Complaint Cases → <code>/CARDSALLOCATION/COMPLAINTS/</code></li></ul>
        <p>📎 Retention: 90 days history. SFTP encryption, SAS token required.</p>
      `,
      "Exception": `
        <h2>⚠️ Exception Approval Matrix</h2>
        <div class="badge">${categoryDisplay} • APPROVAL HIERARCHY</div>
        <div class="info-block"><h3>🔷 WITH ZCLM APPROVAL</h3><p>Caution Follow‑up • Central Lien</p><h3>🔶 WITH NCH APPROVAL</h3><p>Credit Counselling • High Profile Exception • Professional/Watchlist • Vintage Complaints • Low Balance • Legal Exception • CRM Cooling Period • Senior/Deceased</p><h3>🚫 NO APPROVALS</h3><p>Fraudulent Cases • HNW Exception – Infinity • TOP Profile (RBI, IAS, IPS)</p></div>
      `,
      "Exception Tagging": `
        <h2>🏷️ Exception Tagging Protocol</h2>
        <div class="badge">${categoryDisplay} • TAG WORKFLOW</div>
        <div class="info-block"><p>Categories: <strong>Legal, Complaint_TAT, Death/Disability, Flood/Calamity, Agency Dispute</strong>. Use RAC Exception Module.</p><ul><li>Workflow: Identify → Validate reason → NCH/ZCLM approval → update system</li><li>Exception codes: EXC-01 to EXC-12 mapping</li></ul><p>📊 Real-time exception dashboard available internally.</p></div>
      `,
      "Web Collection and Vymo": `
        <h2>📱 Web Collection & Vymo Integration</h2>
        <div class="badge">${categoryDisplay} • DIGITAL PLATFORMS</div>
        <div class="info-block"><p>🔹 <strong>WebCollect</strong>: digital payment follow-ups, auto allocation, dynamic queue. 🔹 <strong>Vymo</strong>: field agent app with call scheduling, geo-tracking, campaign dashboards.</p><p>Allocation updates daily at 6 AM. Real-time queue prioritization.</p></div>
      `,
      "Vendor Empanel": `
        <h2>🤝 Vendor Empanelment Criteria</h2>
        <div class="badge">${categoryDisplay} • PARTNER ONBOARDING</div>
        <div class="info-block"><h3>Empanelment requirements:</h3><ul><li>Minimum 3 years collection experience in cards</li><li>RBI compliant infrastructure & certified</li><li>Team size >25 agents</li><li>Performance track record >75% resolution</li></ul><p><strong>Process:</strong> RFP → technical evaluation → due diligence → committee approval. Quarterly cycles (Jan, Apr, Jul, Oct).</p></div>
      `,
      "Rules": `
        <h2>📜 Allocation Governance & Rules</h2>
        <div class="badge">${categoryDisplay} • COMPLIANCE</div>
        <div class="info-block"><ul><li>Reallocation cap: 7.5% monthly portfolio movement</li><li>No reallocation for NAL accounts without special waiver</li><li>Exception tagging approval within 48h</li><li>Daily allocation files encrypted and shared via SFTP</li><li>Vendor rotation policy: min 12 months assignment period</li></ul><p>Compliance violation leads to formal review. Updated Jan 2025.</p></div>
      `,
      "Tab 1 Heading 1": `
        <h2>📌 Tab 1 Heading 1 — Advanced Card Portfolio Strategy</h2>
        <div class="badge">CARDS • STRATEGIC INITIATIVE</div>
        <div class="info-block"><p>AI-driven segmentation improves collection efficiency and reduces roll rates. Focus on right-party contact rate (+18%) and promise-to-pay adherence (+12%).</p><p>Implementation roadmap: Q3 pilot, full rollout by Q4 with cross-functional monitoring.</p></div>
      `,
      "Tab 1 Heading 2": `
        <h2>📌 Tab 1 Heading 2 — Digital First Allocation Model</h2>
        <div class="badge">CARDS • DIGITAL TRANSFORMATION</div>
        <div class="info-block"><p>Shift toward digital channels (WhatsApp, email, web collect) reduces cost-to-serve. Automated assignment based on customer digital footprint. Projected savings: 22% reduction in agency operational cost. Integration with Vymo and CRM complete.</p></div>
      `,
      // ----- ASSET submenus (Tab 2 Heading 1-5) -----
      "Tab 2 Heading 1": `
        <h2>🏗️ Tab 2 Heading 1 — Asset Rebalancing Strategy</h2>
        <div class="badge">ASSET ALLOCATION • REBALANCING</div>
        <div class="info-block"><p>Dynamic rebalancing across secured & unsecured asset pools. Quarterly review with tolerance bands. Volatility targeting and yield enhancement. Includes Vehicle, LAP, Gold Loan segments. Maximum drift threshold: ±5%.</p></div>
      `,
      "Tab 2 Heading 2": `
        <h2>🌐 Tab 2 Heading 2 — Portfolio Diversification Framework</h2>
        <div class="badge">ASSET ALLOCATION • DIVERSIFICATION</div>
        <div class="info-block"><p>Multi-asset correlation analysis, sector cap limits, geographical exposure management. Stress testing and scenario analysis reports delivered monthly. Target diversification: 40% secured, 30% unsecured, 30% hybrid products.</p></div>
      `,
      "Tab 2 Heading 3": `
        <h2>💰 Tab 2 Heading 3 — Liquidity & Cash Flow Allocation</h2>
        <div class="badge">ASSET ALLOCATION • LIQUIDITY</div>
        <div class="info-block"><p>Real-time cash sweep mechanism, overnight investment vehicles, contingency funding lines. Integrated with treasury workstation and regulatory liquidity reporting (LCR/NSFR). Minimum idle cash target ≤3% of portfolio AUM.</p></div>
      `,
      "Tab 2 Heading 4": `
        <h2>🌱 Tab 2 Heading 4 — ESG Integration Guidelines</h2>
        <div class="badge">ASSET ALLOCATION • SUSTAINABILITY</div>
        <div class="info-block"><p>Integration of environmental, social, governance scores. Exclusion lists for high-carbon sectors, green bond allocations, impact measurement framework. Compliant with UN PRI. Target: 20% new green asset allocation by 2026.</p></div>
      `,
      "Tab 2 Heading 5": `
        <h2>📊 Tab 2 Heading 5 — Tax-Efficient Asset Location</h2>
        <div class="badge">ASSET ALLOCATION • TAX OPTIMIZATION</div>
        <div class="info-block"><p>Asset location optimization across registered/non-registered accounts, tax-loss harvesting, distribution planning. Maximizes after-tax returns. Average tax alpha: +0.45% p.a. based on backtests.</p></div>
      `,
      // ----- CD submenus (Tab 3 Heading 1-5) -----
      "Tab 3 Heading 1": `
        <h2>📞 Tab 3 Heading 1 — Early-Stage Collections Strategy</h2>
        <div class="badge">CD ALLOCATION • EARLY BUCKET</div>
        <div class="info-block"><p>1-30 DPD: Automated reminders, IVR campaigns, digital payment nudges. Dedicated agency bucket strategy with 48h resolution target. Daily contact rate above 85% via omnichannel outreach.</p></div>
      `,
      "Tab 3 Heading 2": `
        <h2>⚖️ Tab 3 Heading 2 — Mid-Delinquency Management</h2>
        <div class="badge">CD ALLOCATION • 31-60 DPD</div>
        <div class="info-block"><p>Enhanced contact frequency, field visits, settlement offers. Legal notice automation for high-risk cases. Monitoring dashboard for vintage buckets. Rollback target: reduce 60+ DPD inflows by 15% QoQ.</p></div>
      `,
      "Tab 3 Heading 3": `
        <h2>🔄 Tab 3 Heading 3 — Write-off Portfolio Recovery</h2>
        <div class="badge">CD ALLOCATION • NPA & WROFF</div>
        <div class="info-block"><p>Specialized agency panel for write-off accounts, skip-tracing tools, and auction platform. Performance-linked fee model, monthly recovery audits. Annual recovery target: 8-12% of written-off portfolio.</p></div>
      `,
      "Tab 3 Heading 4": `
        <h2>🎯 Tab 3 Heading 4 — Predictive Dialer Campaigns</h2>
        <div class="badge">CD ALLOCATION • CAMPAIGN OPT</div>
        <div class="info-block"><p>AI-driven contact scoring, time-zone sequencing, A/B testing for scripts. Integration with WebCollect and Vymo. Real-time agent performance dashboard. Contact efficiency increased by 32% post implementation.</p></div>
      `,
      "Tab 3 Heading 5": `
        <h2>📜 Tab 3 Heading 5 — Compliance & Regulatory Adherence</h2>
        <div class="badge">CD ALLOCATION • FAIR PRACTICES</div>
        <div class="info-block"><p>RBI Fair Practices Code adherence, call recording retention (90 days), DND registry scrubbing, monthly compliance certification. Audit trail for every allocation action. Zero penalty incidents for 3 consecutive quarters.</p></div>
      `
    };

    const defaultContent = `
      <h2>📄 ${submenuTitle}</h2>
      <div class="badge">${categoryDisplay}</div>
      <div class="info-block"><p>Detailed insights for <strong>${submenuTitle}</strong> under ${categoryDisplay}. This section includes operational guidelines, KPIs, and process documentation.</p></div>
      <hr><p>✅ For further details, contact allocation governance team.</p>
    `;
    const contentHtml = contentMap[submenuTitle] || defaultContent;
    return `<div class="content-card" style="padding:0; background:transparent; box-shadow:none;">${contentHtml}</div>`;
  }

  // ---------- SIDEBAR DYNAMIC BUILD + INTERACTIONS ----------
  const sidebarContainer = document.getElementById("sidebarNavMenu");
  const contentArea = document.getElementById("dynamicContentArea");
  let activeSubmenuElement = null;

  function clearActiveSubmenuStyles() {
    document.querySelectorAll('.submenu-item').forEach(item => item.classList.remove('active-sub'));
  }

  function updateParentCategoryHighlight() {
    // remove has-active from all categories
    document.querySelectorAll('.nav-category').forEach(cat => cat.classList.remove('has-active'));
    // if an active submenu exists, find its parent category and add class
    if (activeSubmenuElement) {
      const parentCategory = activeSubmenuElement.closest('.nav-category');
      if (parentCategory) parentCategory.classList.add('has-active');
    }
  }

  function updateContent(categoryId, submenuTitle) {
    const html = generateContent(categoryId, submenuTitle);
    contentArea.innerHTML = html;
  }

  // expand a specific category's submenu if collapsed
  function expandCategory(categoryDiv) {
    const submenuList = categoryDiv.querySelector('.submenu-list');
    const toggleIcon = categoryDiv.querySelector('.toggle-icon');
    if (submenuList && !submenuList.classList.contains('show')) {
      submenuList.classList.add('show');
      if (toggleIcon) toggleIcon.innerHTML = '▲';
    }
  }

  // ensure parent category is expanded when clicking submenu
  function ensureParentExpanded(submenuItem) {
    const parentCategory = submenuItem.closest('.nav-category');
    if (parentCategory) {
      const submenuList = parentCategory.querySelector('.submenu-list');
      const toggleIcon = parentCategory.querySelector('.toggle-icon');
      if (submenuList && !submenuList.classList.contains('show')) {
        submenuList.classList.add('show');
        if (toggleIcon) toggleIcon.innerHTML = '▲';
      }
    }
  }

  // build entire sidebar from configuration
  function buildSidebar() {
    sidebarContainer.innerHTML = '';
    categories.forEach(cat => {
      const categoryDiv = document.createElement('div');
      categoryDiv.className = 'nav-category';
      categoryDiv.dataset.categoryId = cat.id;

      // header
      const header = document.createElement('div');
      header.className = 'category-header';
      header.innerHTML = `
        <div class="category-title">
          <span>${cat.icon}</span> <span>${cat.label}</span>
        </div>
        <span class="toggle-icon">▼</span>
      `;

      const submenuList = document.createElement('div');
      submenuList.className = 'submenu-list';

      cat.submenus.forEach(sub => {
        const subItem = document.createElement('div');
        subItem.className = 'submenu-item';
        subItem.textContent = sub;
        subItem.dataset.submenuTitle = sub;
        subItem.dataset.categoryId = cat.id;

        subItem.addEventListener('click', (e) => {
          e.stopPropagation();
          // expand parent category if collapsed (UX)
          ensureParentExpanded(subItem);
          // update active style
          clearActiveSubmenuStyles();
          subItem.classList.add('active-sub');
          activeSubmenuElement = subItem;
          // update parent category highlight (main menu visual)
          updateParentCategoryHighlight();
          // load content
          updateContent(cat.id, sub);
        });

        submenuList.appendChild(subItem);
      });

      categoryDiv.appendChild(header);
      categoryDiv.appendChild(submenuList);

      // toggle expand / collapse on header click
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        const isExpanded = submenuList.classList.contains('show');
        const toggleIconSpan = header.querySelector('.toggle-icon');
        if (isExpanded) {
          submenuList.classList.remove('show');
          toggleIconSpan.innerHTML = '▼';
        } else {
          submenuList.classList.add('show');
          toggleIconSpan.innerHTML = '▲';
          // Optional: If no submenu is active inside this category, set first as active & load content for better UX
          const anyActive = Array.from(submenuList.querySelectorAll('.submenu-item')).some(item => item.classList.contains('active-sub'));
          if (!anyActive) {
            const firstSub = submenuList.querySelector('.submenu-item');
            if (firstSub) {
              clearActiveSubmenuStyles();
              firstSub.classList.add('active-sub');
              activeSubmenuElement = firstSub;
              updateParentCategoryHighlight();
              const subTitle = firstSub.dataset.submenuTitle;
              const catId = firstSub.dataset.categoryId;
              updateContent(catId, subTitle);
            }
          }
        }
      });

      sidebarContainer.appendChild(categoryDiv);
    });
  }

  // initialize: expand Cards category by default, set first submenu active, load content
  function initializeDefault() {
    buildSidebar();

    // Expand Cards Allocation by default
    const cardsCategory = document.querySelector('.nav-category[data-category-id="cards"]');
    if (cardsCategory) {
      const submenuList = cardsCategory.querySelector('.submenu-list');
      const toggleIcon = cardsCategory.querySelector('.toggle-icon');
      if (submenuList && !submenuList.classList.contains('show')) {
        submenuList.classList.add('show');
        if (toggleIcon) toggleIcon.innerHTML = '▲';
      }
      // activate first submenu item (Reallocation)
      const firstSub = cardsCategory.querySelector('.submenu-item');
      if (firstSub) {
        clearActiveSubmenuStyles();
        firstSub.classList.add('active-sub');
        activeSubmenuElement = firstSub;
        updateParentCategoryHighlight();
        const subTitle = firstSub.dataset.submenuTitle;
        const catId = firstSub.dataset.categoryId;
        updateContent(catId, subTitle);
      }
    } else {
      // fallback
      updateContent('cards', 'Reallocation');
    }
  }

  // start everything
  initializeDefault();
</script>
</body>
</html>
